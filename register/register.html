<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Crear Cuenta - UltraPresetGaming</title>

        <!-- Icono -->
        <link rel="icon" type="image/x-icon" href="../images/Logo pag web.ico">

        <!-- CSS -->
        <link rel="stylesheet" href="register.css" type="text/css"> 

        <!-- Fuentes -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    </head>

    <body>
        <!-- ========================= -->
        <!--     CONTENEDOR GENERAL    -->
        <!-- ========================= -->
        <div class="container">

            <!-- ========================= -->
            <!--    CABECERA DEL REGISTER  -->
            <!-- ========================= -->
            <div class="header-register">
                <!-- Logo -->
                <img src="../images/Logo_Comparador_Absoluto.png" alt="UltraPresetGaming" class="logo-register">

                <!-- Título + subtítulo -->
                <h1>Crear Cuenta</h1>
                <p>Únete a la comunidad gamer</p>
            </div>

            <!-- ========================= -->
            <!--        FORMULARIO         -->
            <!-- ========================= -->
            <form class="register-form"><!-- /register -->

                <!-- Campo: Usuario -->
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                    <span class="input-icon">👤</span>
                </div>

                <!-- Campo: Email -->
                <div class="input-group">
                    <label for="mail">Correo electrónico</label>
                    <input type="email" id="mail" name="mail" required>
                    <span class="input-icon">📧</span>
                </div>

                <!-- Campo: Contraseña -->
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                    <span class="input-icon">🔒</span>
                </div>

                <!-- Campo: Confirmar contraseña -->
                <div class="input-group">
                    <label for="password2">Confirmar Contraseña</label>
                    <input type="password" id="password2" name="password2" required>
                    <span class="input-icon">🔒</span>
                </div>

                <!-- Botón -->
                <button type="submit" class="btn-register">Crear Cuenta</button>
            </form>

            <!-- ========================= -->
            <!--    FOOTER DEL REGISTER    -->
            <!-- ========================= -->
            <div class="footer-register">
                <!-- Link login -->
                <p>¿Ya tienes cuenta? <a href="../Login/login.html">Iniciar sesión</a></p>

                <!-- Volver a inicio -->
                <a href="../Proyecto_5_pagina.html" class="back-home">⬅️ Volver al inicio</a>
            </div>
        </div>
    </body>
</html>
