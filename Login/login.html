<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Iniciar Sesión - UltraPresetGaming</title>

        <!-- Icono -->
        <link rel="icon" type="image/x-icon" href="../images/Logo pag web.ico">

        <!-- CSS -->
        <link rel="stylesheet" href="login.css" type="text/css"> 

        <!-- Fuentes -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    </head>

    <body>
        <!-- ========================= -->
        <!--     CONTENEDOR GENERAL    -->
        <!-- ========================= -->
        <div class="container">

            <!-- ========================= -->
            <!--       HEADER LOGIN        -->
            <!-- ========================= -->
            <div class="header-login">
                <!-- Logo -->
                <img src="../images/Logo_Comparador_Absoluto.png" alt="UltraPresetGaming" class="logo-login">

                <!-- Título + subtítulo -->
                <h1>UltraPresetGaming</h1>
                <p>Accede a los mejores precios y mods</p>
            </div>

            <!-- ========================= -->
            <!--        FORMULARIO         -->
            <!-- ========================= -->
            <form class="login-form"> <!-- /login -->

                <!-- Campo: Usuario -->
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                    <span class="input-icon">👤</span>
                </div>

                <!-- Campo: Email -->
                <div class="input-group">
                    <label for="mail">Correo electrónico</label>
                    <input type="email" id="mail" name="mail" required>
                    <span class="input-icon">📧</span>
                </div>

                <!-- Campo: Contraseña -->
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                    <span class="input-icon">🔒</span>
                </div>

                <!-- Botón -->
                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>

            <!-- ========================= -->
            <!--     FOOTER DEL LOGIN      -->
            <!-- ========================= -->
            <div class="footer-login">
                <!-- Link a registro -->
                <a href="../register/register.html">¿No tienes cuenta? Regístrate</a>

                <!-- Volver a inicio -->
                <a href="../Proyecto_5_pagina.html" class="back-home">⬅️ Volver al inicio</a>
            </div>

        </div>
    </body>
</html>
